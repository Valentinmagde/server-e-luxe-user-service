components:
  schemas:
    Subscriber:
      type: object
      properties:
        _id:
          type: string
        email:
          type: string
        type:
          type: string
        start_date:
          type: string
          format: date-time
        end_date:
          type: string
          format: date-time
        status:
          type: string
          enum:
            - Active
            - Inactive
        is_deleted:
          type: boolean
        deleted_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
