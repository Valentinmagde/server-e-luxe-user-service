<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to Our Newsletter</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f7;
      color: #333333;
      margin: 0;
      padding: 20px;
      line-height: 1.6;
    }

    .email-container {
      max-width: 600px;
      margin: auto;
      background: #ffffff;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    h1 {
      font-size: 26px;
      color: #333333;
      font-weight: bold;
      margin-bottom: 20px;
    }

    p {
      font-size: 15px;
      color: #555555;
      margin-bottom: 25px;
    }

    .button {
      display: inline-block;
      background-color: #ca8a04;
      color: #ffffff !important;
      text-decoration: none;
      padding: 14px 28px;
      font-size: 15px;
      font-weight: bold;
      border-radius: 6px;
      margin-top: 10px;
      transition: background-color 0.3s ease;
    }

    .button:hover {
      background-color: #C6A020;
    }

    .footer {
      margin-top: 30px;
      font-size: 13px;
      color: #777777;
      border-top: 1px solid #efefef;
      padding-top: 20px;
      line-height: 1.5;
    }

    .footer a {
      color: #1a82e2;
      text-decoration: none;
    }

    @media (max-width: 600px) {
      .email-container {
        padding: 20px;
      }

      .button {
        width: 100%;
        text-align: center;
        padding: 14px 0;
      }
    }
  </style>
</head>

<body>
  <div class="email-container">
    <h1>Welcome to Our Newsletter!</h1>
    <p>Thank you for subscribing! Get ready to receive exclusive updates, special offers, and inspiring content straight to your inbox.</p>

    <a href="{{manage_subscription_url}}" class="button">Manage My Subscription</a>

    <div class="footer">
      <p>If you no longer wish to receive our emails, you can <a href="{{unsubscribe_url}}">unsubscribe here</a>.</p>
      <p>Thank you for being part of our community!</p>
    </div>
  </div>
</body>

</html>
